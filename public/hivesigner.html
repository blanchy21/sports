<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HiveSigner Callback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 2rem;
        background: #0f172a;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 1rem;
      }
      p {
        margin-bottom: 0.75rem;
        line-height: 1.5;
      }
      .dim {
        color: rgba(241, 245, 249, 0.7);
        font-size: 0.9375rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Completing HiveSigner Login&hellip;</h1>
      <p class="dim" id="status">Processing response, please wait.</p>
      <p class="dim">You can close this tab once the window refreshes.</p>
    </main>
    <script>
      (function () {
        try {
          var hash = window.location.hash.startsWith('#')
            ? window.location.hash.substring(1)
            : window.location.search.substring(1);
          var params = new URLSearchParams(hash);

          var accessToken = params.get('access_token');
          var expiresIn = params.get('expires_in');
          var username = params.get('username');

          if (!accessToken || !username) {
            throw new Error('Missing HiveSigner authentication details');
          }

          var expiryTimestamp = expiresIn ? Date.now() + Number(expiresIn) * 1000 : null;

          // Log token lifetime for diagnostics
          console.log('[HiveSigner callback] username:', username,
            '| expires_in:', expiresIn, 'seconds',
            '| expires_at:', expiryTimestamp ? new Date(expiryTimestamp).toISOString() : 'unknown');

          // Store token in localStorage (persists across tabs & browser sessions).
          // Keys match hivesigner.ts constants.
          localStorage.setItem('hs_token', accessToken);
          localStorage.setItem('hs_username', username);
          if (expiryTimestamp) {
            localStorage.setItem('hs_expiry', String(expiryTimestamp));
          }

          // Save wallet session keys for WalletProvider to restore.
          localStorage.setItem('sportsblock:walletProvider', 'hivesigner');
          localStorage.setItem('sportsblock:walletUsername', username);

          // Notify opener if available (desktop popup flow).
          if (window.opener && typeof window.opener.postMessage === 'function') {
            window.opener.postMessage({
              source: 'hivesigner-callback',
              success: true,
              username: username,
              accessToken: accessToken,
              expiryTimestamp: expiryTimestamp,
            }, window.location.origin);
          }

          // In popup mode the opener handles login via the postMessage above.
          // Close the popup so the opener can detect completion.
          if (window.opener) {
            document.getElementById('status').textContent = 'Login successful! This window will close\u2026';
            setTimeout(function () { window.close(); }, 1500);
            return;
          }

          // Mobile / redirect mode (no opener) — create session cookie and redirect.
          // Save auth state for AuthContext hydration.
          var authState = {
            user: {
              id: username,
              username: username,
              displayName: username,
              isHiveAuth: true,
              hiveUsername: username,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            },
            authType: 'hive',
            hiveUser: {
              username: username,
              isAuthenticated: true,
              provider: 'hivesigner',
            },
            loginAt: Date.now(),
          };
          localStorage.setItem('authState', JSON.stringify(authState));
          localStorage.setItem('authHint', JSON.stringify({
            wasLoggedIn: true,
            displayHint: username,
            authTypeHint: 'hive',
          }));

          document.getElementById('status').textContent = 'Login information saved. Redirecting\u2026';

          fetch('/api/auth/sb-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              userId: username,
              username: username,
              authType: 'hive',
              hiveUsername: username,
              loginAt: Date.now(),
              hivesignerToken: accessToken,
            }),
          })
            .catch(function (err) {
              console.warn('[HiveSigner callback] Failed to create session cookie:', err);
            })
            .finally(function () {
              window.location.replace('/sportsbites');
            });
        } catch (error) {
          console.error('[HiveSigner callback] Failed to process response', error);
          document.getElementById('status').textContent =
            'We could not process the HiveSigner response. Please close this tab and try again.';

          if (window.opener && typeof window.opener.postMessage === 'function') {
            window.opener.postMessage(
              {
                source: 'hivesigner-callback',
                success: false,
                error: error instanceof Error ? error.message : 'Unknown error',
              },
              window.location.origin
            );
          }
        }
      })();
    </script>
  </body>
</html>
